name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # MongoDB service so the Mongo repository integration test runs for real
    # (it self-skips when MONGODB_TEST_URI is unset, e.g. local `npm test`).
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build web client
        run: npm run build

      - name: Server tests
        run: npm test
        env:
          MONGODB_TEST_URI: mongodb://localhost:27017/myelotrack_test
